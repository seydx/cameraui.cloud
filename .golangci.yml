version: "2"

linters:
  enable:
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - revive
    - unparam
    - prealloc
  settings:
    gocritic:
      enabled-checks:
        - rangeValCopy
        - hugeParam
        - unnamedResult
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: redefines-builtin-id
          disabled: true
  exclusions:
    paths:
      - examples